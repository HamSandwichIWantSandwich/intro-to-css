<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="title">Information!</div>
<div class="all">
    <div class="bar"><img src="https://github.com/TheOdinProject/css-exercises/blob/main/foundations/flex/04-flex-information/images/barberry.png?raw=true" alt="barberry">
    <div class="text">This is a type of plant. We love this one.</div></div>

    <div class="chili"><img src="https://github.com/TheOdinProject/css-exercises/blob/main/foundations/flex/04-flex-information/images/chilli.png?raw=true" alt="chili">
    <div class="text">This is another type of plant. Isn't it nice?</div></div>

    <div class="pepper"><img src="https://github.com/TheOdinProject/css-exercises/blob/main/foundations/flex/04-flex-information/images/pepper.png?raw=true" alt="pepper">
    <div class="text">We have so many plants. Yay plants.</div></div>

    <div class="saf"><img src="https://github.com/TheOdinProject/css-exercises/blob/main/foundations/flex/04-flex-information/images/saffron.png?raw=true" alt="saffron">
    <div class="text">I'm running out of things to say about plants.</div></div>

    <!-- disregard this section, it's here to give attribution to the creator of these icons -->
    <div class="footer">
      <div>Icons made by <a href="https://www.flaticon.com/authors/icongeek26" title="Icongeek26">Icongeek26</a> from <a href="https://www.flaticon.com/" title="Flaticon">www.flaticon.com</a></div>
    </div>
</div>
  </body>
</html>
